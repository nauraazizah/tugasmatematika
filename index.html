<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Math Station 🕹️</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Arcade & Modern -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; }
        .arcade-font { font-family: 'Orbitron', sans-serif; }
        /* Efek Tombol Mekanik Game */
        .arcade-btn {
            position: relative;
            border-bottom: 5px solid rgba(0,0,0,0.4);
            transition: all 0.1s ease;
        }
        .arcade-btn:active {
            transform: translateY(3px);
            border-bottom-width: 2px;
        }
        /* Efek Scanline Layar CRT Game Lama */
        .crt-screen {
            position: relative;
            overflow: hidden;
        }
        .crt-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col justify-between p-4 sm:p-6 selection:bg-amber-500 selection:text-black">

    <!-- TOP BAR: HERO CLASS SELECTOR (KUSTOMISASI UTAMA BARU) -->
    <header class="max-w-4xl w-full mx-auto bg-slate-900 border-4 border-slate-800 p-4 rounded-2xl shadow-xl flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="text-center md:text-left">
            <h1 class="arcade-font text-xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500">
                ⚡ MATH_QUEST.EXE
            </h1>
            <p class="text-[11px] text-slate-400 uppercase font-bold mt-0.5 tracking-wider">Pilih Class Hero Lu Buat Kalibrasi Gaya Belajar</p>
        </div>
        
        <!-- CLASS BUTTONS -->
        <div class="grid grid-cols-3 gap-2 w-full md:w-auto">
            <button onclick="setClass('mage')" id="c-mage" class="arcade-btn px-3 py-2 rounded-xl text-[10px] font-black tracking-wide uppercase bg-purple-600 text-white">
                🔮 MAGE
            </button>
            <button onclick="setClass('rogue')" id="c-rogue" class="arcade-btn px-3 py-2 rounded-xl text-[10px] font-black tracking-wide uppercase bg-emerald-600 text-white">
                🥷 ROGUE
            </button>
            <button onclick="setClass('mech')" id="c-mech" class="arcade-btn px-3 py-2 rounded-xl text-[10px] font-black tracking-wide uppercase bg-cyan-600 text-white">
                🤖 MECH
            </button>
        </div>
    </header>

    <!-- MAIN ARCADE CABINET MACHINE -->
    <main class="max-w-4xl w-full mx-auto my-6 bg-gradient-to-b from-slate-800 to-slate-950 p-4 sm:p-6 rounded-3xl border-8 border-slate-700 shadow-2xl relative">
        
        <!-- INSIDE CABINET: DYNAMIC GLOWING SCREEN -->
        <div id="theme-screen" class="crt-screen bg-slate-950 border-4 border-zinc-900 rounded-2xl p-4 sm:p-6 shadow-inner text-slate-300 transition-all duration-300 min-h-[480px] flex flex-col justify-between">
            
            <!-- CONTROLLER SCREEN CONTENT -->
            <div class="space-y-6">
                <!-- SCREEN HEADER -->
                <div class="flex justify-between items-center border-b-2 border-slate-900 pb-3">
                    <div class="flex items-center gap-2">
                        <div id="class-indicator" class="w-2.5 h-2.5 rounded-full bg-purple-500 animate-ping"></div>
                        <span id="subject-badge" class="arcade-font text-xs font-black tracking-widest text-slate-400"></span>
                    </div>
                    <span id="hero-tag" class="text-[10px] bg-slate-900 border border-slate-800 px-2.5 py-0.5 rounded font-mono font-bold text-amber-400"></span>
                </div>

                <!-- MATERI CONTENT BLOCK -->
                <div class="space-y-2">
                    <h2 id="subject-title" class="arcade-font text-lg font-black tracking-wide text-white"></h2>
                    <p id="subject-desc" class="text-xs sm:text-sm text-slate-400 leading-relaxed font-medium"></p>
                </div>

                <!-- FORMULA DISPLAY CORE -->
                <div id="formula-box" class="bg-slate-900/80 p-4 rounded-xl border border-slate-800 text-xs text-slate-400 font-medium">
                    <!-- Injected dynamically -->
                </div>

                <!-- INTERACTIVE MINI-QUIZ PANEL -->
                <div class="bg-black/40 border-2 border-slate-900 p-4 rounded-xl space-y-3">
                    <div class="flex items-center gap-2">
                        <span class="text-xs">🎮</span>
                        <h4 class="arcade-font text-xs font-bold tracking-wider text-amber-400">STRIKE QUIZ MISSION</h4>
                    </div>
                    <p id="quiz-text" class="text-xs sm:text-sm text-slate-200 font-semibold"></p>
                    
                    <!-- Options container -->
                    <div id="quiz-choices" class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                        <!-- Buttons injected via script -->
                    </div>
                    
                    <!-- Instant Alert Feedback -->
                    <div id="quiz-alert" class="hidden text-xs font-bold p-2.5 rounded-lg text-center font-mono"></div>
                </div>
            </div>

            <!-- EXTERNAL YOUTUBE FOOTER LINK -->
            <div class="pt-6 border-t border-slate-900 mt-6 flex flex-col sm:flex-row justify-between items-center gap-4">
                <span class="text-[10px] font-mono text-slate-600">SYS_STATUS: CRITICAL_MATH_SOLVED</span>
                <a id="video-btn" href="#" target="_blank" class="arcade-btn w-full sm:w-auto text-center px-5 py-2.5 bg-amber-400 text-slate-950 font-black text-xs tracking-wider uppercase rounded-xl hover:bg-amber-300">
                    Buka Video Strategi ↗
                </a>
            </div>

        </div>

        <!-- OUTSIDE CABINET: PHYSICAL GAME BUTTONS CONTROL -->
        <div class="mt-6 pt-4 border-t-4 border-slate-800 grid grid-cols-1 sm:grid-cols-3 gap-3">
            <button onclick="selectSubject('sptldv')" id="b-sptldv" class="arcade-btn w-full p-3 rounded-xl text-xs font-black tracking-widest uppercase bg-slate-900 text-slate-400 border-slate-950">
                🕹️ 1. SPTLDV LAYER
            </button>
            <button onclick="selectSubject('trigo')" id="b-trigo" class="arcade-btn w-full p-3 rounded-xl text-xs font-black tracking-widest uppercase bg-slate-900 text-slate-400 border-slate-950">
                🔮 2. TRIGO MAGIC
            </button>
            <button onclick="selectSubject('stats')" id="b-stats" class="arcade-btn w-full p-3 rounded-xl text-xs font-black tracking-widest uppercase bg-slate-900 text-slate-400 border-slate-950">
                📊 3. STATS CORE
            </button>
        </div>
    </main>

    <!-- FOOTER COPYRIGHT -->
    <footer class="text-center text-[10px] text-slate-600 font-mono uppercase tracking-widest pt-4">
        GAMESTATION ENGINE v4.0 • CREATED FOR THE BOYS © 2026
    </footer>

    <!-- ENGINE JAVASCRIPT SYSTEM -->
    <script>
        let activeSubject = 'sptldv';
        let activeClass = 'mage';

        // DATABASE MATERI + PERUBAHAN STYLE BAHASA HERO CLASS
        const gameDatabase = {
            sptldv: {
                badge: "MISSION: ALGEBRA",
                title: "Sistem Pertidaksamaan Linear Dua Variabel (SPTLDV)",
                desc: {
                    mage: "Mantra khusus memetakan wilayah sihir aman (Daerah Penyelesaian). Gambar garis batas penghalang (garis utuh kalau ada mantra '=', garis putus-putus kalau gak ada), lalu rapalkan uji elemen (0,0). Jika segel bernilai BENAR, arsir wilayah lingkaran (0,0) tersebut!",
                    rogue: "Cara nge-crack sistem keamanan wilayah koordinat. Hack titik potong sumbu X sama Y pake trik angka nol, tarik garis bypass, terus injeksi koordinat (0,0) buat uji validasi server. Kalau tembus (BENAR), sikat habis arsirannya di sana. Sat-set langsung kelar!",
                    mech: "Protokol kalibrasi batas ruang pertidaksamaan linear. Sistem wajib menghitung intersep sumbu kartesius X dan Y secara simultan. Jika relasi menggunakan operator kesamaan (≤/≥), gunakan solid-line. Jalankan tes logika ordinal (0,0) untuk fiksasi area grafik."
                },
                formula: `
                    <div class="space-y-1">
                        <p class="text-amber-400 font-black font-mono">⚡ RULESET DATA MATRIKS:</p>
                        <p>• Uji Titik (0,0) pada persamaan 2x + 3y ≤ 12 menghasilkan output: <strong>0 ≤ 12 (VALID / BENAR)</strong>.</p>
                        <p>• Kondisi x ≥ 0 dan y ≥ 0 mengunci pergerakan daerah hasil mutlak berada di area <strong>Kuadran I</strong>.</p>
                    </div>
                `,
                quiz: {
                    text: "Jika tanda pertidaksamaan pada soal adalah 'x + y > 4' (tidak ada sama dengannya), jenis garis pembatas apa yang wajib kita gambar pada grafik?",
                    choices: [
                        { text: "Garis putus-putus (Gak ada tanda sama dengan)", isCorrect: true },
                        { text: "Garis lurus utuh tebal", isCorrect: false }
                    ]
                },
                link: "https://www.youtube.com/results?search_query=belajar+sptldv+mudah"
            },
            trigo: {
                badge: "MISSION: GEOMETRY",
                title: "Trigonometri Dasar & Rumus Perbandingan Segitiga",
                desc: {
                    mage: "Seni membaca elemen segitiga siku-siku melalui sudut pusaran. Gunakan tiga mantra kuno pemanggil sisi: Sin = Demi (Depan/Miring), Cos = Sami (Samping/Miring), Tan = Desa (Depan/Samping). Kuasai juga gerbang kuadran mistis lewat segel ASTC (All-Sin-Tan-Cos)!",
                    rogue: "Skimming rahasia perbandingan sudut segitiga. Hafalan maut penyembuh beban ujian: Sin itu Depan dibagi Miring, Cos itu Samping dibagi Miring, dan Tan itu Depan dibagi Samping. Eksekusi sudut istimewa kuadran I pake trik lima jari tangan biar gak ketahuan mencontek!",
                    mech: "Sistem komputasi trigonometri pada geometri siku-siku. Mengkalkulasi rasio proyeksi vektor terhadap sumbu elevasi sudut. Formula dasar: Sinus = Depan/Miring, Kosinus = Samping/Miring, Tangen = Depan/Samping. Distribusi polaritas muatan nilai dikontrol oleh koordinat Kuadran I-IV."
                },
                formula: `
                    <div class="space-y-1">
                        <p class="text-amber-400 font-black font-mono">⚡ RANGKUMAN DATA SUDUT ISTIMEWA (SIN):</p>
                        <p class="font-mono bg-black/40 p-2 rounded border border-slate-900 text-center text-amber-300">
                            Sin 30° = 1/2  |  Sin 45° = 1/2√2  |  Sin 60° = 1/2√3
                        </p>
                    </div>
                `,
                quiz: {
                    text: "Ada tangga sepanjang 6 meter bersandar membentuk sudut 60° dengan lantai. Tinggi tembok yang dicapai tangga dihitung memakai rasio rumus apa?",
                    choices: [
                        { text: "Rumus SIN (Perbandingan Sisi Depan/Miring)", isCorrect: true },
                        { text: "Rumus TAN (Perbandingan Sisi Depan/Samping)", isCorrect: false }
                    ]
                },
                link: "https://www.youtube.com/results?search_query=trik+trigonometri+sudut+istimewa"
            },
            stats: {
                badge: "MISSION: ANALYTICS",
                title: "Statistika: Pengolahan Data Tunggal Kelas 10",
                desc: {
                    mage: "Tiga roh penjaga tumpukan data acak. Ada Mean (meramal nilai rata-rata kelompok data), Median (menemukan inti jiwa terdalam alias nilai tengah setelah data diurutkan sakral), dan Modus (wujud energi yang paling sering menampakkan diri/paling eksis).",
                    rogue: "Operasi intelijen data mining mencari statistik data tunggal. Looting nilai Mean dengan menjumlahkan seluruh angka lalu dibagi total banyaknya sampel. Amankan data Median pas di tengah setelah diurutkan, dan cari Modus yaitu angka yang paling sering ngetren keluar!",
                    mech: "Pemrosesan algoritma telemetri data deskriptif tunggal. Subsistem mengeksekusi tiga parameter utama: Mean (rerata aritmatika via akumulasi sigma nilai per total populasi N), Median (titik tengah distribusi data sekuensial), dan Modus (frekuensi densitas kemunculan tertinggi)."
                },
                formula: `
                    <div class="space-y-1">
                        <p class="text-amber-400 font-black font-mono">⚡ KALKULASI EKSTRA DATA (6, 7, 8, 8, 9):</p>
                        <p>• <strong>Mean:</strong> 38 / 5 = 7.6  |  <strong>Median:</strong> nilai tengah urutan ganjil = 8</p>
                        <p>• <strong>Jangkauan (Range):</strong> Nilai Max - Nilai Min ➔ 9 - 6 = 3.</p>
                    </div>
                `,
                quiz: {
                    text: "Diketahui sekumpulan data kuis: 5, 6, 7, 7, 10. Berapakah nilai Jangkauan (Range) dari data tunggal tersebut?",
                    choices: [
                        { text: "Jangkauan = 5 (Didapat dari 10 - 5)", isCorrect: true },
                        { text: "Jangkauan = 7 (Karena angka 7 paling dominan)", isCorrect: false }
                    ]
                },
                link: "https://www.youtube.com/results?search_query=statistika+data+tunggal+kelas+10"
            }
        };

        // KUSTOMISASI ATURAN WARNA KONSOL BERDASARKAN CLASS
        const classThemes = {
            mage: { bg: "shadow-[inset_0_0_25px_rgba(147,51,234,0.3)] border-purple-900/60", indicator: "bg-purple-500", tag: "🔮 MATH_SORCERER" },
            rogue: { bg: "shadow-[inset_0_0_25px_rgba(16,185,129,0.3)] border-emerald-900/60", indicator: "bg-emerald-500", tag: "🥷 DATA_GLITCHER" },
            mech: { bg: "shadow-[inset_0_0_25px_rgba(6,182,212,0.3)] border-cyan-900/60", indicator: "bg-cyan-500", tag: "🤖 EQUATION_TITAN" }
        };

        function updateArcadeMachine() {
            const currentData = gameDatabase[activeSubject];
            const currentTheme = classThemes[activeClass];

            // 1. Update Teks Judul, Tag, dan Deskripsi
            document.getElementById('subject-badge').innerText = currentData.badge;
            document.getElementById('hero-tag').innerText = currentTheme.tag;
            document.getElementById('subject-title').innerText = currentData.title;
            document.getElementById('subject-desc').innerText = currentData.desc[activeClass];
            
            // 2. Update Rumus Box Tengah
            document.getElementById('formula-box').innerHTML = currentData.formula;

            // 3. Update Link Video
            document.getElementById('video-btn').href = currentData.link;

            // 4. Update Kuis Interaktif
            document.getElementById('quiz-text').innerText = currentData.quiz.text;
            document.getElementById('quiz-alert').className = "hidden text-xs font-bold p-2.5 rounded-lg text-center font-mono"; // Reset alert

            const choicesContainer = document.getElementById('quiz-choices');
            choicesContainer.innerHTML = ''; // Clear lama
            currentData.quiz.choices.forEach(choice => {
                const button = document.createElement('button');
                button.innerText = choice.text;
                button.className = "arcade-btn p-3 bg-slate-900 border border-slate-800 rounded-xl text-left text-xs font-semibold hover:bg-slate-800 transition text-slate-300";
                button.onclick = function() { checkGameQuiz(choice.isCorrect); };
                choicesContainer.appendChild(button);
            });

            // 5. Ubah Tema Warna Layar CRT Secara Dinamis
            const screen = document.getElementById('theme-screen');
            screen.className = `crt-screen bg-slate-950 border-4 rounded-2xl p-4 sm:p-6 text-slate-300 transition-all duration-300 min-h-[480px] flex flex-col justify-between ${currentTheme.bg}`;
            
            const indicator = document.getElementById('class-indicator');
            indicator.className = `w-2.5 h-2.5 rounded-full animate-ping ${currentTheme.indicator}`;

            // 6. Sinkronisasi Tombol Fisik Bawah
            const subjects = ['sptldv', 'trigo', 'stats'];
            subjects.forEach(s => {
                const btn = document.getElementById(`b-${s}`);
                if (s === activeSubject) {
                    btn.className = "arcade-btn w-full p-3 rounded-xl text-xs font-black tracking-widest uppercase bg-amber-400 text-slate-950 border-amber-600";
                } else {
                    btn.className = "arcade-btn w-full p-3 rounded-xl text-xs font-black tracking-widest uppercase bg-slate-900 text-slate-500 border-slate-950";
                }
            });

            // 7. Sinkronisasi Tombol Atas (Class Selector)
            const classes = ['mage', 'rogue', 'mech'];
            classes.forEach(c => {
                const topBtn = document.getElementById(`c-${c}`);
                if (c === activeClass) {
                    topBtn.style.opacity = "1";
                    topBtn.style.transform = "scale(1.05)";
                } else {
                    topBtn.style.opacity = "0.4";
                    topBtn.style.transform = "scale(1)";
                }
            });
        }

        // Action Handlers
        function checkGameQuiz(isCorrect) {
            const alertBox = document.getElementById('quiz-alert');
            alertBox.classList.remove('hidden');
            if (isCorrect) {
                alertBox.innerText = "🎯 CRITICAL HIT! JAWABAN LU BENER, MISI SELESAI +100 XP! 👑";
                alertBox.className = "text-xs font-bold p-2.5 rounded-lg text-center font-mono bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 block animate-bounce";
            } else {
                alertBox.innerText = "💥 MISSION FAILED! HP BERKURANG, COBA CEK LAGI FORMULANYA!";
                alertBox.className = "text-xs font-bold p-2.5 rounded-lg text-center font-mono bg-rose-500/10 border border-rose-500/30 text-rose-400 block";
            }
        }

        function selectSubject(id) {
            activeSubject = id;
            updateArcadeMachine();
        }

        function setClass(className) {
            activeClass = className;
            updateArcadeMachine();
        }

        // Initialize On Load
        document.addEventListener("DOMContentLoaded", function() {
            updateArcadeMachine();
        });
    </script>
</body>
</html>
