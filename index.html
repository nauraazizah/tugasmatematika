<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Math Planner 🎀</title>
    <!-- Tailwind CSS Resmi -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Cantik & Super Aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;900&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            transition: background-color 0.4s ease;
        }
        .serif-font {
            font-family: 'Playfair Display', serif;
        }
        .planner-shadow {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.03);
        }
        /* Efek kertas binder bergaris tipis halus */
        .binder-paper {
            background-color: #ffffff;
            background-image: linear-gradient(#f3f4f6 1px, transparent 1px);
            background-size: 100% 28px;
        }
    </style>
</head>
<body id="body-bg" class="bg-rose-50/60 text-stone-700 min-h-screen p-3 sm:p-6 flex flex-col justify-between selection:bg-rose-200 selection:text-stone-900">

    <!-- TOP HEADER: DESK MOOD FILTER (KUSTOMISASI UTAMA BARU) -->
    <header class="max-w-4xl w-full mx-auto bg-white/80 backdrop-blur-md p-4 rounded-2xl border border-stone-100 planner-shadow flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
        <div class="text-center sm:text-left">
            <h1 class="serif-font text-2xl font-bold italic text-stone-800 tracking-wide">
                iq's study journal ☁️
            </h1>
            <p class="text-[11px] text-stone-400 font-bold uppercase tracking-widest mt-0.5">Math Study Hub // Kelas 10 SMA</p>
        </div>
        
        <!-- STICKER PALETTE FILTER BUTTONS -->
        <div class="flex bg-stone-50 p-1 rounded-xl border border-stone-100 gap-1.5">
            <button onclick="setDeskMood('pink')" id="m-pink" class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all flex items-center gap-1">
                🌸 Soft Ribbon
            </button>
            <button onclick="setDeskMood('green')" id="m-green" class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all flex items-center gap-1">
                🍵 Matcha
            </button>
            <button onclick="setDeskMood('purple')" id="m-purple" class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all flex items-center gap-1">
                🍇 Lavender
            </button>
        </div>
    </header>

    <!-- MAIN BINDER NOTEBOOK NOTEBOOK LAYOUT -->
    <main class="max-w-4xl w-full mx-auto bg-white rounded-[2.5rem] border-4 border-stone-100 planner-shadow p-4 sm:p-8 relative overflow-hidden">
        
        <!-- DECORATIVE BINDER HOLES (Efek Lubang Binder Buku di Sebelah Kiri) -->
        <div class="absolute left-3 top-0 bottom-0 flex flex-col justify-around py-8 pointer-events-none hidden md:flex">
            <div class="w-4 h-4 rounded-full bg-stone-200 border-inner shadow-inner"></div>
            <div class="w-4 h-4 rounded-full bg-stone-200 border-inner shadow-inner"></div>
            <div class="w-4 h-4 rounded-full bg-stone-200 border-inner shadow-inner"></div>
            <div class="w-4 h-4 rounded-full bg-stone-200 border-inner shadow-inner"></div>
            <div class="w-4 h-4 rounded-full bg-stone-200 border-inner shadow-inner"></div>
        </div>

        <!-- INSIDE BINDER CONTENT (Slightly indented for the rings) -->
        <div class="md:pl-6 flex flex-col justify-between min-h-[500px]">
            
            <div class="space-y-6">
                <!-- MODULE TABS NAVIGATION -->
                <nav class="flex flex-wrap gap-2 border-b border-stone-100 pb-3">
                    <button onclick="changeSubject('sptldv')" id="t-sptldv" class="px-4 py-2 rounded-full text-xs font-bold transition-all duration-300">
                        📒 1. Modul SPTLDV
                    </button>
                    <button onclick="changeSubject('trigo')" id="t-trigo" class="px-4 py-2 rounded-full text-xs font-bold transition-all duration-300">
                        📐 2. Trigonometri
                    </button>
                    <button onclick="changeSubject('stats')" id="t-stats" class="px-4 py-2 rounded-full text-xs font-bold transition-all duration-300">
                        📊 3. Statistika Data
                    </button>
                </nav>

                <!-- SUBJECT DETAIL BANNER -->
                <div>
                    <span id="subject-badge" class="text-[10px] font-bold tracking-widest uppercase px-2.5 py-1 rounded-full text-stone-500 bg-stone-100"></span>
                    <h2 id="subject-title" class="serif-font text-2xl font-bold text-stone-800 mt-2"></h2>
                </div>

                <!-- CONCEPT JOURNAL PAPER -->
                <div class="binder-paper p-5 rounded-2xl border border-stone-100/80 shadow-sm space-y-2">
                    <h4 class="text-xs font-bold text-stone-400 tracking-wider uppercase flex items-center gap-1">✨ Ringkasan Catatan Cantik:</h4>
                    <p id="subject-desc" class="text-xs sm:text-sm text-stone-600 leading-relaxed font-medium"></p>
                </div>

                <!-- CORE DATA MATRIX FORMULA BOX -->
                <div id="formula-box" class="p-4 rounded-xl text-xs font-medium text-stone-600">
                    <!-- Dynamic via javascript -->
                </div>

                <!-- CUTE QUIZ CORNER -->
                <div class="bg-stone-50/80 p-5 rounded-2xl border border-stone-100/60 space-y-3">
                    <div class="flex items-center gap-1.5">
                        <span class="text-xs">✏️</span>
                        <h4 class="text-xs font-bold uppercase tracking-wider text-stone-500">Self-Evaluation Quiz Corner</h4>
                    </div>
                    <p id="quiz-question" class="text-xs sm:text-sm text-stone-700 font-bold leading-relaxed"></p>
                    
                    <!-- Choices container buttons -->
                    <div id="quiz-choices" class="grid grid-cols-1 sm:grid-cols-2 gap-2 pt-1">
                        <!-- Dynamic buttons -->
                    </div>
                    
                    <!-- Instant Quiz Answer Box -->
                    <div id="quiz-feedback" class="hidden text-xs font-bold p-3 rounded-xl text-center border transition-all"></div>
                </div>
            </div>

            <!-- EXTERNAL COMPLEMENTARY FOOTER LINK -->
            <div class="pt-6 border-t border-stone-100 mt-8 flex flex-col sm:flex-row justify-between items-center gap-4">
                <span class="text-[10px] text-stone-400 font-medium uppercase tracking-widest">Status: Notes Successfully Saved ♡</span>
                <a id="video-link" href="#" target="_blank" class="w-full sm:w-auto text-center px-5 py-2.5 text-white font-bold text-xs tracking-wide uppercase rounded-full shadow-sm hover:opacity-90 transition duration-300">
                    Tonton Video Pembahasan ☕
                </a>
            </div>

        </div>
    </main>

    <!-- FOOTER CREDITS -->
    <footer class="text-center text-[10px] text-stone-400 font-medium tracking-widest uppercase py-6">
        🌸 crafted with love for a bright future • aesthetic notes v3.0 © 2026 🌸
    </footer>

    <!-- ENGINE SYSTEM CODE -->
    <script>
        let currentSubject = 'sptldv';
        let currentMood = 'pink';

        // DATABASE MATERI + QUIZ MATEMATIKA LENGKAP KELAS 10
        const studyDatabase = {
            sptldv: {
                badge: "Topik: Aljabar Linier",
                title: "Sistem Pertidaksamaan Linear Dua Variabel",
                desc: "Cara mencari daerah penyelesaian grafik itu sebenarnya gampang dan estetik banget kok! Pertama, kita cari titik potong di sumbu X dan sumbu Y secara bergantian dengan bantuan angka nol, lalu tarik garis lurus penghubung yang rapi. Terakhir, kita uji pakai titik paling gampang yaitu (0,0). Kalau hasilnya terbukti benar sesuai soalnya, tinggal kita arsir dengan cantik daerah yang menutupi titik (0,0) tersebut. Selesai!",
                formula: `
                    <div class="space-y-1.5 bg-rose-50/30 p-4 rounded-xl border border-rose-100/50">
                        <p class="font-bold text-stone-800 flex items-center gap-1">📌 Catatan Aturan Garis Gambar:</p>
                        <p>• Gunakan <span class="underline decoration-wavy">garis lurus utuh</span> jika tanda pertidaksamaan memakai komponen sama dengan (≤ atau ≥).</p>
                        <p>• Gunakan <span class="underline decoration-dashed">garis putus-putus manis</span> jika tanda pertidaksamaan murni lebih besar/kecil saja (< atau >).</p>
                    </div>
                `,
                quiz: {
                    question: "Jika daerah hasil dari pertidaksamaan x + y ≥ 5 kita uji menggunakan titik uji pusat (0,0), apakah pernyataan tersebut menghasilkan kesimpulan nilai yang benar atau salah?",
                    choices: [
                        { text: "Salah, karena 0 tidak lebih besar dari 5 🌸", isCorrect: true },
                        { text: "Benar, karena nilai 0 selalu benar 🌸", isCorrect: false }
                    ]
                },
                link: "https://www.youtube.com/results?search_query=belajar+sptldv+mudah"
            },
            trigo: {
                badge: "Topik: Geometri Segitiga",
                title: "Trigonometri Dasar & Aturan Rasio Sisi",
                desc: "Trigonometri itu cuma membahas perbandingan rasio ukuran panjang sisi segitiga siku-siku berdasarkan sudut estetiknya. Jembatan keledai super gampang buat hafalan kita: Sin itu Demi (Depan dibagi Miring), Cos itu Sami (Samping dibagi Miring), dan Tan itu Desa (Depan dibagi Samping). Jangan sampai tertukar ya! Serta hafalkan rumus pembagian wilayah kuadran memakai singkatan manis ASTC (All, Sin, Tan, Cos).",
                formula: `
                    <div class="space-y-1.5 bg-rose-50/30 p-4 rounded-xl border border-rose-100/50">
                        <p class="font-bold text-stone-800 flex items-center gap-1">📌 Nilai Cantik Sudut Istimewa Kuadran I:</p>
                        <p class="font-mono text-[11px] text-stone-500 bg-white/80 p-2 rounded border border-stone-100 text-center">
                            Sin 30° = 1/2  |  Sin 45° = 1/2√2  |  Sin 60° = 1/2√3
                        </p>
                    </div>
                `,
                quiz: {
                    question: "Sebuah tangga sepanjang 6 meter bersandar manis di tembok dengan sudut lantai 60°. Tinggi tembok bangunan tersebut bisa dicari paling tepat menggunakan bantuan rasio rumus apa?",
                    choices: [
                        { text: "Memakai rumus SIN (Perbandingan Depan/Miring) ✨", isCorrect: true },
                        { text: "Memakai rumus COS (Perbandingan Samping/Miring) ✨", isCorrect: false }
                    ]
                },
                link: "https://www.youtube.com/results?search_query=trik+trigonometri+sudut+istimewa"
            },
            stats: {
                badge: "Topik: Pengolahan Data",
                title: "Statistika Dasar: Ukuran Pemusatan Data Tunggal",
                desc: "Di materi statistika pengolahan data tunggal kelas 10, kita akan berteman akrab sama kelompok tiga serangkai utama: Mean (mencari nilai rata-rata, rumusnya tinggal jumlahkan seluruh angka data lalu dibagi dengan total frekuensi data), Median (mencari nilai pas di tengah, syaratnya urutkan dulu data dari kecil ke besar), dan Modus (mencari angka data yang paling sering muncul atau paling hits di kelompok itu).",
                formula: `
                    <div class="space-y-1.5 bg-rose-50/30 p-4 rounded-xl border border-rose-100/50">
                        <p class="font-bold text-stone-800 flex items-center gap-1">📌 Rumus Tambahan Jangkauan (Range):</p>
                        <p>• Jangkauan dicari dengan selisih angka paling tinggi dikurangi angka paling rendah (Xmax - Xmin).</p>
                        <p>• Contoh data tunggal (6, 7, 8, 8, 9) memiliki Mean = 7.6, Median = 8, Modus = 8, dan Range = 3.</p>
                    </div>
                `,
                quiz: {
                    question: "Diketahui data nilai matematika beberapa murid adalah: 5, 6, 7, 7, 10. Berapakah hasil nilai Jangkauan (Range) dari kelompok data tunggal tersebut?",
                    choices: [
                        { text: "Nilai Jangkauan = 5 (Didapat dari 10 dikurangi 5) 💕", isCorrect: true },
                        { text: "Nilai Jangkauan = 7 (Karena angka 7 paling sering keluar) 💕", isCorrect: false }
                    ]
                },
                link: "https://www.youtube.com/results?search_query=statistika+data+tunggal+kelas+10"
            }
        };

        // KONFIGURASI TEMA WARNA ESTETIK BERDASARKAN FILTER MOOD PASARAN CEWE
        const moodThemes = {
            pink: {
                bodyBg: "bg-rose-50/60",
                navActive: "bg-rose-100 text-rose-700 font-bold",
                btnActive: "bg-rose-400 text-white shadow-sm",
                accentBox: "bg-rose-50/40 border-rose-100/60 text-stone-600",
                primaryBtn: "bg-gradient-to-r from-rose-400 to-pink-400 shadow-rose-200"
            },
            green: {
                bodyBg: "bg-emerald-50/50",
                navActive: "bg-emerald-100 text-emerald-800 font-bold",
                btnActive: "bg-emerald-500 text-white shadow-sm",
                accentBox: "bg-emerald-50/40 border-emerald-100/60 text-stone-600",
                primaryBtn: "bg-gradient-to-r from-emerald-400 to-teal-500 shadow-emerald-200"
            },
            purple: {
                bodyBg: "bg-violet-50/60",
                navActive: "bg-violet-100 text-violet-700 font-bold",
                btnActive: "bg-violet-400 text-white shadow-sm",
                accentBox: "bg-violet-50/40 border-violet-100/60 text-stone-600",
                primaryBtn: "bg-gradient-to-r from-violet-400 to-fuchsia-400 shadow-violet-200"
            }
        };

        function renderPlanner() {
            const data = studyDatabase[currentSubject];
            const theme = moodThemes[currentMood];

            // 1. Ganti Latar Belakang Body Utama
            document.getElementById('body-bg').className = `${theme.bodyBg} text-stone-700 min-h-screen p-3 sm:p-6 flex flex-col justify-between selection:bg-rose-200 selection:text-stone-900`;

            // 2. Injeksi Teks Konten & Deskripsi Materi
            document.getElementById('subject-badge').innerText = data.badge;
            document.getElementById('subject-title').innerText = data.title;
            document.getElementById('subject-desc').innerText = data.desc;

            // 3. Injeksi Kotak Rumus Tengah & Ubah Warnanya Dinamis
            const formulaBox = document.getElementById('formula-box');
            formulaBox.innerHTML = data.formula;
            formulaBox.firstElementChild.className = `space-y-1.5 p-4 rounded-xl border ${theme.accentBox}`;

            // 4. Injeksi Teks Soal Kuis
            document.getElementById('quiz-question').innerText = data.quiz.question;
            document.getElementById('quiz-feedback').className = "hidden text-xs font-bold p-3 rounded-xl text-center border transition-all"; // Reset alert

            // 5. Injeksi Pilihan Tombol Kuis
            const choicesBox = document.getElementById('quiz-choices');
            choicesBox.innerHTML = '';
            data.quiz.choices.forEach(ch => {
                const button = document.createElement('button');
                button.innerText = ch.text;
                button.className = "p-3 bg-white border border-stone-200 text-stone-600 rounded-xl text-left text-xs font-medium hover:bg-stone-50 transition duration-200";
                button.onclick = function() { checkPlannerQuiz(ch.isCorrect); };
                choicesBox.appendChild(button);
            });

            // 6. Update Link Video Button + Styling Warnanya
            const videoBtn = document.getElementById('video-link');
            videoBtn.href = data.link;
            videoBtn.className = `w-full sm:w-auto text-center px-5 py-2.5 text-white font-bold text-xs tracking-wide uppercase rounded-full shadow-md hover:opacity-90 transition duration-300 ${theme.primaryBtn}`;

            // 7. Sinkronisasi Styling Navigasi Tab Modul Materi
            const subjects = ['sptldv', 'trigo', 'stats'];
            subjects.forEach(s => {
                const tab = document.getElementById(`t-${s}`);
                if (s === currentSubject) {
                    tab.className = `px-4 py-2 rounded-full text-xs font-bold transition-all duration-300 ${theme.navActive}`;
                } else {
                    tab.className = "px-4 py-2 rounded-full text-xs font-medium text-stone-400 hover:text-stone-600 transition-all duration-300";
                }
            });

            // 8. Sinkronisasi Tombol Atas (Desk Mood Switcher)
            const moods = ['pink', 'green', 'purple'];
            moods.forEach(m => {
                const moodBtn = document.getElementById(`m-${m}`);
                if (m === currentMood) {
                    moodBtn.className = `px-3 py-1.5 rounded-lg text-xs font-bold transition-all flex items-center gap-1 ${theme.btnActive}`;
                } else {
                    moodBtn.className = "px-3 py-1.5 rounded-lg text-xs font-medium text-stone-400 hover:text-stone-600 transition-all flex items-center gap-1";
                }
            });
        }

        // Handler Validasi Kuis Interaktif Lembut
        function checkPlannerQuiz(isCorrect) {
            const feedback = document.getElementById('quiz-feedback');
            feedback.classList.remove('hidden');
            if (isCorrect) {
                feedback.innerText = "🌸 Yay! Jawaban kamu benar, catatan kamu semakin sempurna! (+500 Aura Points) ✨";
                feedback.className = "text-xs font-bold p-3 rounded-xl text-center border bg-emerald-50/50 border-emerald-200 text-emerald-600 block animate-bounce";
            } else {
                feedback.innerText = "☁️ Oh no, kurang tepat! Jangan sedih, coba koreksi lagi langkah coretan rumusnya ya!";
                feedback.className = "text-xs font-bold p-3 rounded-xl text-center border bg-rose-50/50 border-rose-200 text-rose-500 block";
            }
        }

        // Action Router
        function changeSubject(id) {
            currentSubject = id;
            renderPlanner();
        }

        function setDeskMood(moodId) {
            currentMood = moodId;
            renderPlanner();
        }

        // Auto Run On Load
        document.addEventListener("DOMContentLoaded", function() {
            renderPlanner();
        });
    </script>
</body>
</html>
